name: Build apps (.dmg + AppImage)

# Builds the macOS .dmg (Apple Silicon) and the Linux AppImage.
# Run from the Actions tab (Run workflow) or push a version tag (v*).
# On a tag, both are published to a GitHub Release with direct download links.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-14            # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build .app + .dmg
        run: |
          chmod +x packaging/build-macos.sh
          ./packaging/build-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: WISPERMO-macos-dmg
          path: WISPERMO.dmg
          if-no-files-found: error
      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: WISPERMO.dmg
          generate_release_notes: true

  linux:
    runs-on: ubuntu-22.04        # older glibc -> runs on Arch/Fedora/Ubuntu/…
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build AppImage
        run: |
          chmod +x packaging/build-appimage.sh
          ./packaging/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: WISPERMO-linux-AppImage
          path: wispermo-x86_64.AppImage
          if-no-files-found: error
      - name: Publish to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wispermo-x86_64.AppImage
          generate_release_notes: true
